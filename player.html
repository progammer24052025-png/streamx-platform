<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamX | Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="player.css">
</head>

<body class="player-page">
    <div class="redirect-notice" id="redirect-notice" aria-live="polite">
        <i class='bx bx-loader-alt bx-spin'></i>
        <span id="redirect-notice-text">Redirecting to YouTube...</span>
    </div>
    <header class="player-header">
        <a href="home.html" class="logo">
            <i class='bx bxs-movie'></i> StreamX
        </a>
        <a href="home.html" class="btn back-btn"><i class='bx bx-arrow-back'></i> Back to Home</a>
    </header>

    <main class="player-layout">
        <section class="player-panel">
            <div class="player-frame-wrap">
                <div id="player"></div>
            </div>

            <div class="player-controls">
                <button type="button" class="btn control-btn" id="play-pause-btn">
                    <i class='bx bx-play'></i> Play
                </button>
                <button type="button" class="btn control-btn ghost" id="rewind-btn">
                    <i class='bx bx-rewind-circle'></i> -10s
                </button>
                <button type="button" class="btn control-btn ghost" id="forward-btn">
                    <i class='bx bx-fast-forward-circle'></i> +10s
                </button>
                <button type="button" class="btn control-btn ghost" id="mute-btn">
                    <i class='bx bx-volume-full'></i> Mute
                </button>
            </div>

            <div class="kbd-help">
                <p><strong>Keyboard:</strong> <kbd>Space</kbd>/<kbd>K</kbd> play-pause, <kbd>←</kbd> -10s, <kbd>→</kbd> +10s, <kbd>M</kbd> mute</p>
            </div>
        </section>

        <aside class="movie-info-card">
            <img id="movie-poster" src="assets/fallback/poster.svg" alt="Movie poster">
            <h1 id="movie-title">Loading title...</h1>
            <div class="movie-meta">
                <span id="movie-year">—</span>
                <span><i class='bx bxs-star'></i> <span id="movie-rating">—</span></span>
            </div>
            <div id="movie-genres" class="movie-genres"></div>
            <p id="movie-desc">Loading description...</p>
        </aside>
    </main>

    <script src="data/catalog.js"></script>
    <script src="data/movie-db.js"></script>
    <script src="player.js"></script>
</body>

</html>
