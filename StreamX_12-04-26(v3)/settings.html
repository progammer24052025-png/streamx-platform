<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamX | Settings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="settings.css">
</head>

<body class="settings-page">
    <header class="settings-header">
        <a href="home.html" class="logo">
            <i class='bx bxs-movie'></i> StreamX
        </a>
        <a href="home.html" class="btn"><i class='bx bx-arrow-back'></i> Back to Home</a>
    </header>

    <main class="settings-layout">
        <section class="settings-card">
            <h1>Settings</h1>
            <p class="settings-subtitle">Static and responsive preferences saved in your browser.</p>

            <form id="settings-form" novalidate>
                <label for="settings-username">Username</label>
                <input id="settings-username" type="text" maxlength="24" placeholder="Enter your username" required>

                <p class="emoji-title">Choose your emoji profile</p>
                <div class="emoji-grid" id="emoji-grid">
                    <button type="button" class="emoji-option" data-emoji="🙂">🙂</button>
                    <button type="button" class="emoji-option" data-emoji="😎">😎</button>
                    <button type="button" class="emoji-option" data-emoji="🔥">🔥</button>
                    <button type="button" class="emoji-option" data-emoji="🚀">🚀</button>
                    <button type="button" class="emoji-option" data-emoji="🎬">🎬</button>
                    <button type="button" class="emoji-option" data-emoji="🍿">🍿</button>
                    <button type="button" class="emoji-option" data-emoji="⭐">⭐</button>
                    <button type="button" class="emoji-option" data-emoji="🤖">🤖</button>
                    <button type="button" class="emoji-option" data-emoji="🧠">🧠</button>
                    <button type="button" class="emoji-option" data-emoji="👑">👑</button>
                </div>

                <div class="profile-preview" id="profile-preview">
                    <span id="preview-emoji">🙂</span>
                    <span id="preview-name">Guest</span>
                </div>

                <hr class="settings-divider">

                <h2 class="settings-group-title">Appearance</h2>
                <label for="theme-mode">Theme mode</label>
                <select id="theme-mode">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                    <option value="system">System</option>
                </select>

                <label for="accent-color">Accent color</label>
                <select id="accent-color">
                    <option value="#ff2c1f">Crimson</option>
                    <option value="#2563eb">Blue</option>
                    <option value="#9333ea">Purple</option>
                    <option value="#059669">Emerald</option>
                </select>

                <hr class="settings-divider">

                <h2 class="settings-group-title">Playback & Effects</h2>
                <div class="toggle-row">
                    <span>Celebration animation</span>
                    <label class="switch">
                        <input id="celebration-enabled" type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-row">
                    <span>Player keyboard shortcuts</span>
                    <label class="switch">
                        <input id="shortcuts-enabled" type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <label for="default-volume">Default player volume</label>
                <input id="default-volume" type="range" min="0" max="100" step="1" value="70">
                <p class="inline-meta">Volume: <span id="volume-value">70</span>%</p>

                <div class="toggle-row">
                    <span>Start player muted</span>
                    <label class="switch">
                        <input id="start-muted" type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>

                <hr class="settings-divider">

                <h2 class="settings-group-title">Data</h2>
                <button type="button" class="btn ghost danger" id="clear-local-data-btn">Clear All Local Data</button>

                <div class="settings-actions">
                    <button type="submit" class="btn">Save Settings</button>
                    <button type="button" class="btn ghost" id="reset-profile-btn">Reset</button>
                </div>
                <p class="settings-feedback" id="settings-feedback" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="settings.js"></script>
</body>

</html>
